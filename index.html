  <link rel="manifest" href="manifest.json">
  <style>
    body { margin:0; font-family: Arial, sans-serif; direction: rtl; background:#0d1117; color:#c9d1d9; }
    #container { display: flex; height: 100vh; position: relative; }
    #map { flex: 3; }
    #sidebar {
      flex: 1;
      background: #161b22;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      padding: 15px;
      box-shadow: -2px 0 5px rgba(0,0,0,0.5);
    }
    h2 { 
      color: #ff4444; 
      text-align: center; 
      margin: 0 0 5px 0; 
      font-size: 1.8em;
    }
    #timer {
      text-align: center;
      font-size: 0.9em;
      color: #aaa;
      margin-bottom: 10px;
    }
    #status-text {
      font-size: 1.4em;
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
    }
    .no-alert { 
      color: #56d364; 
      background: rgba(86,211,100,0.15); 
      border: 1px solid #56d364; 
    }
    .has-alert { 
      color: #ff9999; 
      background: rgba(255,68,68,0.15); 
      border: 1px solid #ff4444; 
    }
    .alert {
      background: rgba(255,68,68,0.15);
      border: 1px solid #ff4444;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      color: #ff9999;
    }
    #push-container {
      text-align: center;
      margin: 20px 0;
    }
    #enable-push {
      padding: 15px 30px;
      font-size: 1.3em;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #push-status {
      font-size: 1.1em;
      color: #aaa;
      margin-bottom: 10px;
    }
    #logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #ff4444aa;
      box-shadow: 0 3px 10px rgba(255,68,68,0.3);
      z-index: 1000;
      pointer-events: none;
    }
    #logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    let markers = {};
    for (let city in places) {
      markers[city] = L.marker(places[city]).addTo(map).bindPopup(city);
    }

    let previousAlerts = [];
    let secondsLeft = 15;
    let timerInterval;

    const statusText = document.getElementById('status-text');
    const timerText = document.getElementById('timer');

    function updateTimer() {
      timerText.textContent = `רענון בעוד ${secondsLeft} שניות`;
      secondsLeft--;
      if (secondsLeft < 0) secondsLeft = 15;
    }

    // כפתור התראות – יצירה + רישום event אחרי שהדף נטען לגמרי
    window.addEventListener('load', () => {
      if ('Notification' in window && 'serviceWorker' in navigator && 'PushManager' in window) {
        const pushContainer = document.getElementById('push-container');
        const pushStatus = document.getElementById('push-status');

        if (Notification.permission === 'granted') {
          pushStatus.textContent = 'התראות מאושרות ✓';
          pushStatus.style.color = '#56d364';
          return;
        }

        if (Notification.permission === 'denied') {
          pushStatus.textContent = 'התראות נחסמו';
          pushStatus.style.color = '#aaa';
          return;
        }

        const button = document.createElement('button');
        button.id = 'enable-push';
        button.textContent = 'אפשר התראות + סאונד';
        button.style.padding = '15px 30px';
        button.style.fontSize = '1.3em';
        button.style.background = '#ff4444';
        button.style.color = 'white';
        button.style.border = 'none';
        button.style.borderRadius = '10px';
        button.style.cursor = 'pointer';

        button.addEventListener('click', async () => {
          try {
            const reg = await navigator.serviceWorker.register('/sw.js');
            console.log('Service Worker רשום');

            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
              alert('התראות מאושרות! עכשיו תקבל סאונד גם ברקע');
              button.style.display = 'none';
              pushStatus.textContent = 'התראות מאושרות ✓';
              pushStatus.style.color = '#56d364';
            } else if (permission === 'denied') {
              alert('לא אישרת – הסאונד יעבוד רק כשהאפליקציה פתוחה');
              button.style.display = 'none';
              pushStatus.textContent = 'התראות נחסמו';
              pushStatus.style.color = '#aaa';
            }
          } catch (err) {
            console.error('שגיאה:', err);
            alert('שגיאה: ' + err.message);
          }
        });

        pushContainer.appendChild(button);
      } else {
        document.getElementById('push-status').textContent = 'הדפדפן שלך לא תומך בהתראות';
      }
    });

    async function fetchAlerts() {
      const alertsDiv = document.getElementById('alerts');
      const audio = document.getElementById('sirenSound');

      secondsLeft = 15;

      try {
        let res = await fetch('https://www.kore.co.il/redAlert.json', { cache: 'no-cache' });
        let data = await res.json();

        alertsDiv.innerHTML = '';

        let currentAlerts = [];

        if (data && data.data && data.data.length > 0) {
          statusText.className = 'has-alert';
          statusText.textContent = 'יש אזעקות פעילות';

          data.data.forEach(city => {
            const p = document.createElement('p');
            p.className = 'alert';
            p.textContent = city;
            alertsDiv.appendChild(p);

            if (markers[city]) {
              markers[city].setIcon(L.divIcon({
                html: '<div style="background:red;color:white;width:30px;height:30px;border-radius:50%;text-align:center;line-height:30px;">!</div>',
                iconSize: [30,30],
                className: ''
              }));
            }
            currentAlerts.push(city);
          });

          if (JSON.stringify(currentAlerts.sort()) !== JSON.stringify(previousAlerts.sort())) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("לא ניגן סאונד:", e));
          }

          previousAlerts = currentAlerts;
        } else {
          statusText.className = 'no-alert';
          statusText.textContent = 'אין אזעקות פעילות ✓';
          for (let c in markers) markers[c].setIcon(L.Icon.Default.prototype);
          audio.pause();
          audio.currentTime = 0;
          previousAlerts = [];
        }
      } catch (e) {
        statusText.className = 'no-alert';
        statusText.textContent = 'שגיאה זמנית - נסה רענן';
        console.error(e);
      }
    }

    timerInterval = setInterval(updateTimer, 1000);

    fetchAlerts();
    setInterval(fetchAlerts, 15000);
  </script>
